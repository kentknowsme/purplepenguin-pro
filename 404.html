<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Page Not Found — Purple Penguin Properties LLC</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.bunny.net/css?family=varela-round:400" rel="stylesheet" />
    <link href="https://fonts.bunny.net/css?family=nunito:400,700" rel="stylesheet" />
    <link href="./styles.css" rel="stylesheet" />
    <style>
        .err-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            color: #fff;
            text-align: center;
            font-family: 'Nunito', sans-serif;
        }
        .err-page h1 {
            font-family: 'Varela Round', sans-serif;
            font-size: 6rem;
            color: #9b4ec7;
            margin: 0;
            line-height: 1;
        }
        .err-page h2 {
            font-size: 1.5rem;
            margin: 0.5rem 0 1.5rem;
            color: rgba(255,255,255,0.75);
        }
        .err-page .btn {
            font-family: 'Varela Round', sans-serif;
            background: #671B8D;
            color: #fff;
            border-radius: 50px;
            padding: 0.75rem 2rem;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .err-page .btn:hover { background: #4e1469; color: #fff; }
    </style>
</head>
<body>
    <div class="err-page">
        <div>
            <img src="./ppp-clear.png" alt="Purple Penguin Properties logo" width="80" height="80"
                 style="filter:brightness(0) invert(1); margin-bottom:1.5rem;" />
            <h1>404</h1>
            <h2>Page not found</h2>
            <p style="color:rgba(255,255,255,0.6); max-width:30rem; margin:0 auto 2rem;">
                That page doesn't exist or has moved. Head back home and we'll get you sorted.
            </p>
            <a href="/" class="btn">Back to Home</a>
        </div>
    </div>
</body>
</html>
